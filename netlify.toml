[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  framework = "vite"
  command = "npm run dev"
  targetPort = 5173

[functions]
  "*" = { node_bundler = "esbuild" }
  "search" = { timeout = 26 }
  "create-slides" = { timeout = 30 }

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
